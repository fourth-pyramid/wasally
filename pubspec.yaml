name: wassaly
description: 'Wassaly - Planning App'
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_localizations:
    sdk: flutter

  # Navigation
  go_router: ^17.2.3

  # Networking
  internet_connection_checker_plus: ^3.0.0
  dio: ^5.9.2
  pretty_dio_logger: ^1.4.0

  # State Management
  fpdart: ^1.2.0
  equatable: ^2.0.7
  flutter_bloc: ^9.1.1
  get_it: ^9.2.1

  # Storage
  shared_preferences: ^2.5.4
  flutter_secure_storage: ^10.2.0

  # Images & SVG
  cached_network_image: ^3.4.1
  flutter_svg: ^2.3.0
  cross_file: ^0.3.4
  image_picker_platform_interface: ^2.11.1


  # Shimmer / Skeleton
  skeletonizer: ^2.1.3

  # Responsive UI
  flutter_screenutil: ^5.9.3

  # Animations
  flutter_animate: ^4.5.2
  smooth_page_indicator: ^2.0.1

  # Environment
  flutter_dotenv: ^6.0.1

  # Logging
  logger: ^2.6.2

  # Utilities
  permission_handler: ^12.0.1

  # Device & System
  app_version_update: ^6.2.0

  # OAuth
  url_launcher: ^6.3.0
  app_links: ^7.0.0

  # Localization
  intl: ^0.20.2
  pinput: ^6.0.2
  system_asset_picker: ^0.0.2
  carousel_slider: ^5.1.2
  marquee: ^2.3.0
  hive_flutter: ^1.1.0
  hive: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

  # Code Generation

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/
    - assets/icons/
    - assets/images/
    - .env

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700

